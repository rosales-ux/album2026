<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>⚽ Figuritas Mundial 2026</title>
<style>
:root{--bg:#0a0a1a;--surface:#12122a;--surface2:#1a1a35;--accent:#c9a227;--accent2:#e8c547;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--text2:#a0a0b8;--border:#2a2a4a;--special:#7c3aed;--special2:#a855f7;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#0a0a1a 0%,#1a0a30 50%,#0a1a0a 100%);border-bottom:1px solid var(--border);padding:12px 14px 10px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.2}
.logo-title{font-size:.95rem;font-weight:900;letter-spacing:-.5px;color:var(--accent2);text-transform:uppercase}
.logo-sub{font-size:.6rem;color:var(--text2);font-weight:400;letter-spacing:.5px}
.header-btns{display:flex;gap:5px}
.hbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar-bg{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .4s;width:0%}
.progress-count{font-size:.72rem;font-weight:700;color:var(--accent2);white-space:nowrap;min-width:70px;text-align:right}
.filters{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 11px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0}
.filter-btn.active{background:var(--accent);border-color:var(--accent2);color:#000}
.filter-btn.special-btn.active{background:var(--special);border-color:var(--special2);color:#fff}
.search-wrap{padding:7px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-size:.83rem;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text2)}
main{padding:8px 8px 80px}
.team-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.team-section.complete{border-color:rgba(34,197,94,.4)}
.team-section.complete .team-header{background:rgba(34,197,94,.05)}
.team-header{display:flex;align-items:center;padding:9px 11px;cursor:pointer;gap:9px;user-select:none}
.team-flag{font-size:1.3rem;flex-shrink:0}
.team-info{flex:1;min-width:0}
.team-name{font-weight:700;font-size:.85rem;line-height:1.2}
.team-code{font-size:.62rem;color:var(--text2);letter-spacing:1px}
.team-mini-progress{display:flex;align-items:center;gap:5px;flex-shrink:0}
.team-count{font-size:.72rem;font-weight:700;min-width:34px;text-align:right}
.team-count.done{color:var(--green)}.team-count.partial{color:var(--accent2)}.team-count.none{color:var(--text2)}
.team-mini-bar{width:36px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.team-mini-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.team-chevron{font-size:.75rem;color:var(--text2);transition:transform .2s;flex-shrink:0}
.team-section.open .team-chevron{transform:rotate(180deg)}
.stickers-grid{display:none;grid-template-columns:repeat(7,1fr);gap:4px;padding:7px 9px 10px;border-top:1px solid var(--border);background:var(--surface2)}
.team-section.open .stickers-grid{display:grid}
.stickers-grid.special-grid{grid-template-columns:repeat(5,1fr)}
.sticker-btn{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:.52rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;padding:1px;text-align:center;position:relative;overflow:hidden}
.sticker-btn:active{transform:scale(.88)}
.sticker-btn.collected{background:var(--green);border-color:#16a34a;color:#000}
.sticker-btn.collected::after{content:'✓';position:absolute;top:1px;right:2px;font-size:.5rem;color:rgba(0,0,0,.5)}
.sticker-btn.special-sticker{border-color:var(--special)}
.sticker-btn.special-sticker.collected{background:var(--special);border-color:var(--special2);color:#fff}
.team-actions{display:none;gap:5px;padding:0 9px 9px;background:var(--surface2)}
.team-section.open .team-actions{display:flex}
.quick-btn{flex:1;padding:6px 4px;border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid}
.quick-btn.mark-all{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green)}
.quick-btn.unmark-all{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto}
.modal h2{font-size:1rem;margin-bottom:14px;color:var(--accent2)}
.modal-stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.modal-stat:last-child{border:none}
.modal-stat strong{color:var(--accent2);font-size:.95rem}
.modal-close{width:100%;margin-top:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:.88rem;cursor:pointer;font-weight:600}
.special-badge{background:var(--special);color:#fff;font-size:.52rem;padding:1px 4px;border-radius:3px;font-weight:700}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:.9rem}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--green);color:var(--green);padding:8px 18px;border-radius:20px;font-size:.78rem;font-weight:600;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#c8d8c0"/></radialGradient>
          <radialGradient id="gw" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c9a227" stop-opacity=".6"/><stop offset="100%" stop-color="#c9a227" stop-opacity="0"/></radialGradient>
          <filter id="f"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="50" cy="54" r="38" fill="url(#gw)"/>
        <ellipse cx="50" cy="88" rx="22" ry="5" fill="#000" opacity=".3"/>
        <circle cx="50" cy="50" r="36" fill="url(#bg)" filter="url(#f)"/>
        <polygon points="50,30 62,39 57,53 43,53 38,39" fill="#1a1a2e" opacity=".85"/>
        <polygon points="22,34 34,26 38,39 28,46 18,42" fill="#1a1a2e" opacity=".85"/>
        <polygon points="78,34 66,26 62,39 72,46 82,42" fill="#1a1a2e" opacity=".85"/>
        <polygon points="30,68 38,53 43,53 40,67 30,72" fill="#1a1a2e" opacity=".85"/>
        <polygon points="70,68 62,53 57,53 60,67 70,72" fill="#1a1a2e" opacity=".85"/>
        <polygon points="50,76 40,67 43,53 57,53 60,67" fill="#1a1a2e" opacity=".85"/>
        <ellipse cx="40" cy="36" rx="9" ry="6" fill="white" opacity=".35" transform="rotate(-20 40 36)"/>
        <text x="50" y="19" text-anchor="middle" font-size="13" fill="#c9a227" filter="url(#f)">★</text>
      </svg>
      <div class="logo-text">
        <span class="logo-title">Figuritas 2026</span>
        <span class="logo-sub">FIFA World Cup™ · Panini</span>
      </div>
    </div>
    <div class="header-btns">
      <button class="hbtn" onclick="exportBackup()" title="Exportar backup">💾</button>
      <label class="hbtn" style="cursor:pointer" title="Importar backup">📂<input type="file" accept=".json" onchange="importBackup(event)" style="display:none"></label>
      <button class="hbtn" onclick="openStats()" title="Estadísticas">📊</button>
      <button class="hbtn" onclick="openMissing()" title="Lista de faltantes">📋</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-count" id="progressCount">0 / 980</div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">🌍 Todos</button>
  <button class="filter-btn special-btn" onclick="setFilter('special',this)">⭐ Especiales</button>
  <button class="filter-btn" onclick="setFilter('missing',this)">❌ Faltan</button>
  <button class="filter-btn" onclick="setFilter('complete',this)">✅ Completos</button>
</div>

<div class="search-wrap">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍  Buscar equipo o código (ej: ARG, MEX5...)" oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<main id="main"></main>

<div class="modal-overlay" id="modalOverlay" onclick="closeStats(event)">
  <div class="modal">
    <h2>📊 Tu álbum en números</h2>
    <div id="statsContent"></div>
    <button class="modal-close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<!-- Missing stickers modal -->
<div class="modal-overlay" id="missingOverlay" onclick="closeMissingModal(event)">
  <div class="modal" id="missingModal">
    <h2>📋 Figuritas que faltan</h2>
    <div id="missingCount" style="font-size:.78rem;color:var(--text2);margin-bottom:12px"></div>
    <div id="missingList" style="font-size:.8rem;line-height:2;color:var(--text)"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="modal-close" style="margin-top:0;background:var(--green);border-color:var(--green);color:#000;font-weight:700" onclick="shareMissing()">📤 Compartir lista</button>
      <button class="modal-close" style="margin-top:0;flex:0 0 auto;width:80px" onclick="closeMissingModal()">Cerrar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA OFICIAL PANINI FIFA WORLD CUP 2026 — orden del álbum por grupos ────
const TEAMS = [
  { code:'FWC', name:'Introducción FIFA/FWC', flag:'🏆', special:true, stickers:['00','FWC1','FWC2','FWC3','FWC4','FWC5','FWC6','FWC7','FWC8'] },
  { code:'MEX', name:'México', flag:'🇲🇽' },
  { code:'RSA', name:'Sudáfrica', flag:'🇿🇦' },
  { code:'KOR', name:'Corea del Sur', flag:'🇰🇷' },
  { code:'CZE', name:'Rep. Checa', flag:'🇨🇿' },
  { code:'CAN', name:'Canadá', flag:'🇨🇦' },
  { code:'BIH', name:'Bosnia-Herz.', flag:'🇧🇦' },
  { code:'QAT', name:'Qatar', flag:'🇶🇦' },
  { code:'SUI', name:'Suiza', flag:'🇨🇭' },
  { code:'BRA', name:'Brasil', flag:'🇧🇷' },
  { code:'MAR', name:'Marruecos', flag:'🇲🇦' },
  { code:'HAI', name:'Haití', flag:'🇭🇹' },
  { code:'SCO', name:'Escocia', flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿' },
  { code:'USA', name:'Estados Unidos', flag:'🇺🇸' },
  { code:'PAR', name:'Paraguay', flag:'🇵🇾' },
  { code:'AUS', name:'Australia', flag:'🇦🇺' },
  { code:'TUR', name:'Turquía', flag:'🇹🇷' },
  { code:'GER', name:'Alemania', flag:'🇩🇪' },
  { code:'CUW', name:'Curazao', flag:'🇨🇼' },
  { code:'CIV', name:'C. de Marfil', flag:'🇨🇮' },
  { code:'ECU', name:'Ecuador', flag:'🇪🇨' },
  { code:'NED', name:'Países Bajos', flag:'🇳🇱' },
  { code:'JPN', name:'Japón', flag:'🇯🇵' },
  { code:'SWE', name:'Suecia', flag:'🇸🇪' },
  { code:'TUN', name:'Túnez', flag:'🇹🇳' },
  { code:'BEL', name:'Bélgica', flag:'🇧🇪' },
  { code:'EGY', name:'Egipto', flag:'🇪🇬' },
  { code:'IRN', name:'Irán', flag:'🇮🇷' },
  { code:'NZL', name:'Nueva Zelanda', flag:'🇳🇿' },
  { code:'ARG', name:'Argentina', flag:'🇦🇷' },
  { code:'DZA', name:'Argelia', flag:'🇩🇿' },
  { code:'NOR', name:'Noruega', flag:'🇳🇴' },
  { code:'GHA', name:'Ghana', flag:'🇬🇭' },
  { code:'ESP', name:'España', flag:'🇪🇸' },
  { code:'CPV', name:'Cabo Verde', flag:'🇨🇻' },
  { code:'SEN', name:'Senegal', flag:'🇸🇳' },
  { code:'AUT', name:'Austria', flag:'🇦🇹' },
  { code:'FRA', name:'Francia', flag:'🇫🇷' },
  { code:'COD', name:'Congo DR', flag:'🇨🇩' },
  { code:'UZB', name:'Uzbekistán', flag:'🇺🇿' },
  { code:'CRO', name:'Croacia', flag:'🇭🇷' },
  { code:'POR', name:'Portugal', flag:'🇵🇹' },
  { code:'JOR', name:'Jordania', flag:'🇯🇴' },
  { code:'IRQ', name:'Irak', flag:'🇮🇶' },
  { code:'COL', name:'Colombia', flag:'🇨🇴' },
  { code:'ENG', name:'Inglaterra', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { code:'SAU', name:'Arabia Saudita', flag:'🇸🇦' },
  { code:'PAN', name:'Panamá', flag:'🇵🇦' },
  { code:'URU', name:'Uruguay', flag:'🇺🇾' },
  { code:'MUS', name:'Museo FIFA', flag:'🏛️', special:true, stickers:['MUS1','MUS2','MUS3','MUS4','MUS5','MUS6','MUS7','MUS8','MUS9','MUS10','MUS11'] }
];

const TOTAL = 980;

// Fill normal teams (1-20)
TEAMS.forEach(t => {
  if (!t.stickers) t.stickers = Array.from({length:20},(_,i)=>`${t.code}${i+1}`);
});

// ── STATE ───────────────────────────────────────────────────────────────────
const KEY = 'wc2026_oficial_v1';
let collected = {};
function loadData(){ try{ const r=localStorage.getItem(KEY); if(r) collected=JSON.parse(r); }catch(e){} }
function saveData(){ try{ localStorage.setItem(KEY,JSON.stringify(collected)); }catch(e){} }
function isCollected(s){ return !!collected[s]; }
function toggle(s){ if(collected[s]) delete collected[s]; else collected[s]=1; saveData(); updateProgress(); }

function updateProgress(){
  const n=Object.keys(collected).length;
  const pct=(n/TOTAL*100).toFixed(1);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressCount').textContent=`${n} / ${TOTAL}`;
}

// ── FILTERS ─────────────────────────────────────────────────────────────────
let currentFilter='all', searchTerm='';
function setFilter(f,btn){ currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderMain(); }
function onSearch(){ searchTerm=document.getElementById('searchInput').value.trim().toLowerCase(); renderMain(); }
function teamVisible(t){
  const done=t.stickers.filter(s=>isCollected(s)).length;
  const all=done===t.stickers.length;
  if(currentFilter==='special' && !t.special) return false;
  if(currentFilter==='missing' && all) return false;
  if(currentFilter==='complete' && !all) return false;
  if(searchTerm){
    const m=t.name.toLowerCase().includes(searchTerm)||t.code.toLowerCase().includes(searchTerm)||t.stickers.some(s=>s.toLowerCase().includes(searchTerm));
    if(!m) return false;
  }
  return true;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderMain(){
  const main=document.getElementById('main');
  const vis=TEAMS.filter(teamVisible);
  if(!vis.length){ main.innerHTML='<div class="empty">🔍 Sin resultados.</div>'; return; }
  main.innerHTML='';
  vis.forEach(t=>main.appendChild(buildTeam(t)));
}

function buildTeam(team){
  const stickers=team.stickers;
  const done=stickers.filter(s=>isCollected(s)).length;
  const total=stickers.length;
  const pct=(done/total*100);
  const complete=done===total;
  const cc=done===total?'done':done>0?'partial':'none';
  const sec=document.createElement('div');
  sec.className='team-section'+(complete?' complete':'');
  sec.id='team-'+team.code;
  sec.innerHTML=`
    <div class="team-header" onclick="toggleTeam('${team.code}')">
      <span class="team-flag">${team.flag}</span>
      <div class="team-info">
        <div class="team-name">${team.name}${team.special?' <span class="special-badge">ESPECIAL</span>':''}</div>
        <div class="team-code">${team.code} · ${total} figuritas</div>
      </div>
      <div class="team-mini-progress">
        <div class="team-mini-bar"><div class="team-mini-bar-fill" style="width:${pct}%"></div></div>
        <span class="team-count ${cc}">${done}/${total}</span>
      </div>
      <span class="team-chevron">▼</span>
    </div>
    <div class="stickers-grid${team.special?' special-grid':''}" id="grid-${team.code}">
      ${stickers.map(s=>`<button class="sticker-btn${isCollected(s)?' collected':''}${team.special?' special-sticker':''}" id="stk-${s}" onclick="tapSticker('${s}','${team.code}')">${s}</button>`).join('')}
    </div>
    <div class="team-actions">
      <button class="quick-btn mark-all" onclick="markAll('${team.code}',true)">✅ Marcar todo</button>
      <button class="quick-btn unmark-all" onclick="markAll('${team.code}',false)">❌ Desmarcar todo</button>
    </div>`;
  return sec;
}

function toggleTeam(code){ document.getElementById('team-'+code).classList.toggle('open'); }

function tapSticker(s,code){
  toggle(s);
  const btn=document.getElementById('stk-'+s);
  if(btn) btn.classList.toggle('collected',isCollected(s));
  updateTeamUI(code);
}

function updateTeamUI(code){
  const team=TEAMS.find(t=>t.code===code); if(!team) return;
  const sec=document.getElementById('team-'+code); if(!sec) return;
  const done=team.stickers.filter(s=>isCollected(s)).length;
  const total=team.stickers.length;
  const complete=done===total;
  sec.classList.toggle('complete',complete);
  const cnt=sec.querySelector('.team-count');
  if(cnt){ cnt.textContent=`${done}/${total}`; cnt.className='team-count '+(complete?'done':done>0?'partial':'none'); }
  const bar=sec.querySelector('.team-mini-bar-fill');
  if(bar) bar.style.width=(done/total*100)+'%';
}

function markAll(code,val){
  const team=TEAMS.find(t=>t.code===code); if(!team) return;
  team.stickers.forEach(s=>{ if(val) collected[s]=1; else delete collected[s]; const b=document.getElementById('stk-'+s); if(b) b.classList.toggle('collected',val); });
  saveData(); updateProgress(); updateTeamUI(code);
  showToast(val?`✅ ${team.name} completo`:`❌ ${team.name} desmarcado`);
}

// ── STATS ────────────────────────────────────────────────────────────────────
function openStats(){
  const n=Object.keys(collected).length;
  const complete=TEAMS.filter(t=>t.stickers.every(s=>isCollected(s)));
  const started=TEAMS.filter(t=>t.stickers.some(s=>isCollected(s))&&!t.stickers.every(s=>isCollected(s)));
  const fwc=TEAMS.find(t=>t.code==='FWC');
  const mus=TEAMS.find(t=>t.code==='MUS');
  const spDone=(fwc?fwc.stickers.filter(s=>isCollected(s)).length:0)+(mus?mus.stickers.filter(s=>isCollected(s)).length:0);
  document.getElementById('statsContent').innerHTML=`
    <div class="modal-stat"><span>🎯 Total pegadas</span><strong>${n} / ${TOTAL}</strong></div>
    <div class="modal-stat"><span>📈 Progreso</span><strong>${(n/TOTAL*100).toFixed(1)}%</strong></div>
    <div class="modal-stat"><span>⭐ Especiales (FWC+Museo)</span><strong>${spDone} / 20</strong></div>
    <div class="modal-stat"><span>✅ Equipos completos</span><strong>${complete.length} / ${TEAMS.length}</strong></div>
    <div class="modal-stat"><span>🔄 En progreso</span><strong>${started.length}</strong></div>
    <div class="modal-stat"><span>❌ Faltan</span><strong>${TOTAL-n}</strong></div>
    ${complete.length?`<div class="modal-stat" style="flex-direction:column;align-items:flex-start;gap:6px"><span>🏅 Completos:</span><div style="font-size:.78rem;color:var(--green);line-height:2">${complete.map(t=>t.flag+' '+t.name).join(' · ')}</div></div>`:''}`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeStats(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

// ── BACKUP ───────────────────────────────────────────────────────────────────
function exportBackup(){
  const payload={app:'figuritas-2026-oficial',fecha:new Date().toISOString().slice(0,10),total:Object.keys(collected).length,datos:collected};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`figuritas_2026_${payload.fecha}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast(`💾 Backup — ${payload.total} figuritas`);
}
function importBackup(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const datos=parsed.datos||parsed;
      if(typeof datos!=='object') throw new Error();
      collected=datos; saveData(); renderMain(); updateProgress();
      showToast(`✅ Restaurado — ${Object.keys(collected).length} figuritas`);
    }catch{ showToast('❌ Archivo inválido'); }
    event.target.value='';
  };
  reader.readAsText(file);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2300); }


// ── MISSING LIST ─────────────────────────────────────────────────────────────
function openMissing(){
  const missing = [];
  TEAMS.forEach(team => {
    team.stickers.forEach(s => {
      if (!isCollected(s)) missing.push(s);
    });
  });
  const total = TOTAL - Object.keys(collected).length;
  document.getElementById('missingCount').textContent = `Faltan ${total} de ${TOTAL} figuritas`;
  
  if (missing.length === 0) {
    document.getElementById('missingList').innerHTML = '<span style="color:var(--green)">🎉 ¡Álbum completo!</span>';
  } else {
    // Group by team code
    const groups = {};
    TEAMS.forEach(t => { groups[t.code] = { name: t.name, flag: t.flag, items: [] }; });
    missing.forEach(s => {
      const code = s === '00' ? 'FWC' : s.match(/^([A-Z]+)/)?.[1];
      if (code && groups[code]) groups[code].items.push(s);
    });
    let html = '';
    TEAMS.forEach(t => {
      const g = groups[t.code];
      if (g && g.items.length > 0) {
        html += `<div style="margin-bottom:10px">`;
        html += `<div style="font-size:.72rem;font-weight:700;color:var(--accent2);margin-bottom:4px">${t.flag} ${t.name}</div>`;
        html += `<div style="display:flex;flex-wrap:wrap;gap:4px">`;
        g.items.forEach(s => {
          const isSpecial = t.special;
          html += `<span style="background:${isSpecial ? 'var(--special)' : 'var(--surface2)'};border:1px solid ${isSpecial ? 'var(--special2)' : 'var(--border)'};padding:2px 6px;border-radius:4px;font-size:.7rem;font-weight:600">${s}</span>`;
        });
        html += `</div></div>`;
      }
    });
    document.getElementById('missingList').innerHTML = html;
  }
  document.getElementById('missingOverlay').classList.add('open');
}
function closeMissingModal(e){
  if (!e || e.target === document.getElementById('missingOverlay'))
    document.getElementById('missingOverlay').classList.remove('open');
}


// ── SHARE MISSING ────────────────────────────────────────────────────────────
function shareMissing(){
  const missing = [];
  TEAMS.forEach(team => {
    team.stickers.forEach(s => { if (!isCollected(s)) missing.push(s); });
  });

  // Build text grouped by team
  let lines = [];
  lines.push('⚽ FIGURITAS QUE FALTAN — Mundial 2026 Panini');
  lines.push(`📅 ${new Date().toLocaleDateString('es')}  |  Faltan ${missing.length} de ${TOTAL}`);
  lines.push('');

  TEAMS.forEach(t => {
    const items = t.stickers.filter(s => !isCollected(s));
    if (items.length > 0) {
      lines.push(`${t.flag} ${t.name} (${items.length}/${t.stickers.length})`);
      lines.push(items.join('  '));
      lines.push('');
    }
  });

  const text = lines.join('\n');

  // Try native share (iOS), fallback to copy
  if (navigator.share) {
    navigator.share({ title: 'Figuritas que faltan — Mundial 2026', text }).catch(() => copyToClipboard(text));
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text){
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Lista copiada al portapapeles'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 Lista copiada al portapapeles'); } catch(e) { showToast('❌ No se pudo copiar'); }
    document.body.removeChild(ta);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadData(); renderMain(); updateProgress();
</script>
